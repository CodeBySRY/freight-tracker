{% extends 'base.html' %}
{% block title %}Assign Carrier{% endblock %}
{% block content %}
<div class="page-header"><h2>Assign Carrier to Order #{{ order.order_id }}</h2></div>
<div class="form-card">
    <div style="margin-bottom: 2rem;">
        <p><strong>Customer:</strong> {{ order.customer_name }}</p>
        <p><strong>Route:</strong> {{ order.origin_city }} → {{ order.destination_city }}</p>
        <p><strong>Cargo:</strong> {{ order.cargo_description }}</p>
    </div>

    <form method="post" action="/orders/{{ order.order_id }}/assign">
        <div class="form-group">
            <label class="form-label">Select Available Carrier</label>
            <select name="carrier_id" class="form-select" required>
                <option value="" disabled selected>-- Choose a carrier --</option>
                {% for carrier in carriers %}
                <option value="{{ carrier.carrier_id }}">{{ carrier.company_name }} ({{ carrier.vehicle_type }})</option>
                {% else %}
                <option value="" disabled>No carriers available currently</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Confirm Assignment</button>
        <a href="/orders" class="btn btn-ghost">Cancel</a>
    </form>
</div>
{% endblock %}
