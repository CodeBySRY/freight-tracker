<!-- login.html — Login Page
     Extends base.html but the navbar is hidden (no user in session yet).
     Centered card with email/password form. -->
{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1>FreightTrack</h1>
        <p class="login-subtitle">Freight Order &amp; Shipment Tracking System</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email"
                       class="form-input" placeholder="you@freight.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
