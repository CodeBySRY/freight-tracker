{% extends 'base.html' %}
{% block title %}New Order{% endblock %}
{% block content %}
<div class="page-header"><h2>Create New Order</h2></div>
<div class="form-card">
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="post" action="/orders/new">
        <div class="form-group">
            <label class="form-label">Customer Name</label>
            <input type="text" name="customer_name" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Cargo Description</label>
            <textarea name="cargo_description" class="form-textarea" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Origin City (e.g., Karachi)</label>
            <input type="text" name="origin_city" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Destination City (e.g., Lahore)</label>
            <input type="text" name="destination_city" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Order</button>
        <a href="/orders" class="btn btn-ghost">Cancel</a>
    </form>
</div>
{% endblock %}
