[theme]
# The main accent color (Buttons, active states, progress bars)
primaryColor = "#10b981"

# The main screen background (A very deep, almost-black greenish hue)
backgroundColor = "#04150f"

# The left sidebar background (A sleek, elegant dark forest green)
secondaryBackgroundColor = "#022c22"

# The text color (Crisp off-white for high contrast)
textColor = "#e2e8f0"

font = "sans serif"